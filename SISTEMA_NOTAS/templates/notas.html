<!DOCTYPE html>
<html>
    <head>
        <title>Sistema de Notas</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <div class="container mt-5">
            <h2>Sistema de Notas</h2>
            <form action="/guardar" method="POST">
                <input type="text" name="nombre" placeholder="Nombre" class="form-control mb-2">
                <input type="number" step="0.1" name="nota1" placeholder="Nota 1" class="form-control mb-2">
                <input type="number" step="0.1" name="nota2" placeholder="Nota 2" class="form-control mb-2">
                <input type="number" step="0.1" name="nota3" placeholder="Nota 3" class="form-control mb-2">
                <button class="btn btn-primary">Calcular</button>
            </form>
            <hr>
            <table class="table">
                <tr>
                    <th>Nombre</th>
                    <th>Nota1</th>
                    <th>Nota2</th>
                    <th>Nota3</th>
                    <th>Promedio</th>
                </tr>
                {% for n in notas %}
                <tr>
                    <td>{{n.nombre}}</td>
                    <td>{{n.nota1}}</td>
                    <td>{{n.nota2}}</td>
                    <td>{{n.nota3}}</td>
                    <td>{{n.promedio}}</td>
                </tr>
                {% endfor %}
            </table>
        </div>
    </body>
</html>
